<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validar Email - Invasión Crypto</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
    <link
      rel="shortcut icon"
      href="img/logos/Favicon.png"
      type="image/x-icon"
    />
  </head>
  <body class="auth-body">
    <div class="construction-banner">sitio actualmente en construcción</div>
    <div
      class="header"
      style="
        grid-column: 1 / 3;
        grid-row: 1 / 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        width: 100vw;
        position: fixed;
        top: 0;
        z-index: 100;
      "
    >
      <a href="index.html" class="logo-header-container"></a>
    </div>

    <div class="auth-container">
      <div class="simple-message-box">
        <img
          src="img/logos/Favicon.png"
          alt=""
          style="width: 80px; height: auto"
        />
        <h2>Verificá tu correo</h2>
        <p>
          Revisá tu bandeja de entrada (y spam) para validar tu cuenta. Te
          enviamos un enlace de confirmación.
        </p>

        <button
          class="btn-secondary"
          onclick="showToast('Email de validación reenviado.')"
        >
          Reenviar email
        </button>

        <!-- Simulación de la acción del usuario dando click en su correo -->
        <div
          style="
            margin-top: 2rem;
            border-top: 1px dashed #ccc;
            padding-top: 1rem;
            width: 100%;
          "
        >
          <p style="font-size: 0.8rem; color: #888; margin-bottom: 0.5rem">
            Simulación (Solo para desarrollo):
          </p>
          <a
            href="activar.html"
            class="btn-primary"
            style="font-size: 0.9rem; padding: 0.5em"
            >Validar y continuar</a
          >
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
