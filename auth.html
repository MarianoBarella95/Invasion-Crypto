<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autorización - Invasión Crypto</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
    <link
      rel="shortcut icon"
      href="img/logos/Favicon.png"
      type="image/x-icon"
    />
  </head>
  <body class="auth-body">
    <div class="header">
      <a href="index.html" class="logo-header-container"></a>
    </div>

    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-tabs">
          <button
            class="auth-tab active"
            id="tab-login"
            onclick="switchTab('login')"
          >
            Ingresar
          </button>
          <button
            class="auth-tab"
            id="tab-register"
            onclick="switchTab('register')"
          >
            Registrarse
          </button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
          <h2 class="auth-title">Iniciar Sesión</h2>
          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              required
              placeholder="tu@email.com"
            />
          </div>
          <div class="input-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              required
              placeholder="********"
            />
          </div>
          <button type="submit" class="auth-submit btn-primary">
            Ingresar
          </button>
          <div class="auth-footer">
            <a href="#" id="linkToForgotPassword" class="forgot-password">Olvidé mi contraseña</a>
          </div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form">
          <h2 class="auth-title">Crear Cuenta</h2>
          <div class="input-group">
            <label for="regName">Nombre</label>
            <input type="text" id="regName" required placeholder="Tu Nombre" />
          </div>
          <div class="input-group">
            <label for="regEmail">Email</label>
            <input
              type="email"
              id="regEmail"
              required
              placeholder="tu@email.com"
            />
          </div>
          <div class="input-group">
            <label for="regPassword">Contraseña</label>
            <input
              type="password"
              id="regPassword"
              required
              placeholder="********"
            />
          </div>
          <div class="input-group">
            <label for="regConfirm">Confirmar Contraseña</label>
            <input
              type="password"
              id="regConfirm"
              required
              placeholder="********"
            />
          </div>
          <button type="submit" class="auth-submit btn-primary">
            Crear cuenta
          </button>
        </form>
      </div>
    </div>

    <script>
      function switchTab(tab) {
        document.querySelectorAll(".auth-tab").forEach((t) => t.classList.remove("active"));
        document.getElementById(`tab-${tab}`).classList.add("active");

        document.querySelectorAll(".auth-form").forEach((f) => f.classList.remove("active"));
        if (tab === "login") {
          document.getElementById("loginForm").classList.add("active");
        } else {
          document.getElementById("registerForm").classList.add("active");
        }
      }

      // Check for mode in URL
      const params = new URLSearchParams(window.location.search);
      if (params.get('mode') === 'register') {
          switchTab('register');
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
