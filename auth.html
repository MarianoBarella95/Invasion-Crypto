<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autorización - Invasión Crypto</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
    <link
      rel="shortcut icon"
      href="img/logos/Favicon.png"
      type="image/x-icon"
    />
  </head>
  <body class="auth-body">
    <div
      class="header"
      style="
        grid-column: 1 / 3;
        grid-row: 1 / 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        width: 100vw;
        position: fixed;
        top: 0;
        z-index: 100;
      "
    >
      <a href="index.html" class="logo-header-container"></a>
    </div>

    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-tabs">
          <button
            class="auth-tab active"
            id="tab-login"
            onclick="switchTab('login')"
          >
            Ingresar
          </button>
          <button
            class="auth-tab"
            id="tab-register"
            onclick="switchTab('register')"
          >
            Registrarse
          </button>
        </div>

        <!-- Login Form -->
        <form id="LoginForm" class="auth-form active">
          <h2 class="auth-title">Iniciar Sesión</h2>
          <div class="input-group">
            <label for="login-email">Email</label>
            <input
              type="email"
              id="login-email"
              required
              placeholder="tu@email.com"
            />
          </div>
          <div class="input-group">
            <label for="login-password">Contraseña</label>
            <input
              type="password"
              id="login-password"
              required
              placeholder="********"
            />
          </div>
          <button type="submit" class="auth-submit btn-primary">
            Ingresar
          </button>
          <div class="auth-footer">
            <a href="#" class="forgot-password">Olvidé mi contraseña</a>
          </div>
        </form>

        <!-- Register Form -->
        <form id="RegisterForm" class="auth-form">
          <h2 class="auth-title">Crear Cuenta</h2>
          <div class="input-group">
            <label for="reg-name">Nombre</label>
            <input type="text" id="reg-name" required placeholder="Tu Nombre" />
          </div>
          <div class="input-group">
            <label for="reg-email">Email</label>
            <input
              type="email"
              id="reg-email"
              required
              placeholder="tu@email.com"
            />
          </div>
          <div class="input-group">
            <label for="reg-password">Contraseña</label>
            <input
              type="password"
              id="reg-password"
              required
              placeholder="********"
            />
          </div>
          <div class="input-group">
            <label for="reg-confirm">Confirmar Contraseña</label>
            <input
              type="password"
              id="reg-confirm"
              required
              placeholder="********"
            />
          </div>
          <button type="submit" class="auth-submit btn-primary">
            Crear cuenta
          </button>
        </form>
      </div>
    </div>

    <script>
      function switchTab(tab) {
        // Update tabs
        document
          .querySelectorAll(".auth-tab")
          .forEach((t) => t.classList.remove("active"));
        document.getElementById(`tab-${tab}`).classList.add("active");

        // Update forms
        document
          .querySelectorAll(".auth-form")
          .forEach((f) => f.classList.remove("active"));
        if (tab === "login") {
          document.getElementById("LoginForm").classList.add("active");
        } else {
          document.getElementById("RegisterForm").classList.add("active");
        }
      }

      document
        .getElementById("RegisterForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const pass = document.getElementById("reg-password").value;
          const confirm = document.getElementById("reg-confirm").value;

          if (pass !== confirm) {
            alert("Las contraseñas no coinciden.");
            return;
          }

          // Simular éxito de registro
          window.location.href = "validacion.html";
        });

      document
        .getElementById("LoginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          // Simular login exitoso -> si está activo o no, para ahora simularemos que va al dashboard
          localStorage.setItem("isLoggedIn", "true");
          // Mockeamos el estado
          const hasSubscription = true; // cambiar a false para probar flujo manual
          if (hasSubscription) {
            window.location.href = "panel_usuario.html";
          } else {
            window.location.href = "activar.html";
          }
        });
    </script>
  </body>
</html>
